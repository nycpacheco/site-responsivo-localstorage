<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/style.css">
<title>Login</title>
</head>
<body>

    <div class="left"></div>

    <div class="right">

        <div class="login-box">

            <div class="back">←</div>

            <div class="avatar">
                <img src="/img/avatar.png" alt="user">
            </div>

            <h2>Bem vindo de Volta!</h2>

            <p>Por favor, faça login na sua conta</p>

            <!-- email -->
            <label>Email</label>

            <div class="input-box">

                <span class="icon">✉</span>

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Coloque seu email">

            </div>

            <!-- senha -->
            <label>Senha</label>

            <div class="input-box">

                <span class="icon">🔒</span>

                <input
                    type="password"
                    id="loginSenha"
                    placeholder="Coloque sua senha">

                <span class="show-password"
                    onclick="mostrarSenha('loginSenha')">
                </span>
            </div>

            <!-- opcoes para dar charme -->
            <div class="options">

                <label class="remember">
                    <input type="checkbox">
                    Manter-me conectado
                </label>

                <div class="forgot">

                    <a href="#">Esqueceu sua senha?</a>

                </div>

            </div>

            <!-- login -->
            <button class="login-btn"
            onclick="login()">
                Login
            </button>

            <!-- linha que divide -->
            <div class="divider-line">

                <span>Ou continue com</span>

            </div>

            <!-- google nao funfa -->
            <button class="social-btn">
                Login com Google
                <img src="/img/google.png" alt="Google">

            </button>

            <!-- suap nao funfa -->
            <button class="social-btn">
                
                Login com Suap
                <img src="/img/suap.png" alt="Suap">

            </button>

            <!-- registre -->
            <button class="signup-btn"
            onclick="window.location.href='cadastro.html'">

                Nao tem uma conta? Cadastre-se

            </button>

        </div>

    </div>

<script src="/js/script.js"></script>
</body>
</html>
